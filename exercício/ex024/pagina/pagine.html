<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Meu Portfólio</title>
 <style>
    body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

.slider {
    width: 80%;
    margin: auto;
    overflow: hidden;
}

.slides img {
    width: 300px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.slides img:hover {
    transform: scale(1.05);
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
}

.conteudo {
    width: 80%;
    height: 80%;
    margin: 5% auto;
    background: white;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.fechar {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    cursor: pointer;
}
 </style>
</head>

<body>

    <h1>Meus Projetos</h1>

    <div class="slider">

        <div class="slides">
            <img src="img1.jpg" onclick="abrirProjeto('projeto1/index.html')">
            <img src="img2.jpg" onclick="abrirProjeto('projeto2/index.html')">
            <img src="img3.jpg" onclick="abrirProjeto('projeto3/index.html')">
        </div>

    </div>

    <div class="modal" id="modal">
        <div class="conteudo">
            <span class="fechar" onclick="fecharProjeto()">X</span>
            <iframe id="iframeProjeto"></iframe>
        </div>
    </div>

     <script>
        function abrirProjeto(url) {
                document.getElementById("modal").style.display = "block";
                document.getElementById("iframeProjeto").src = url;
            }

            function fecharProjeto() {
                document.getElementById("modal").style.display = "none";
                document.getElementById("iframeProjeto").src = "";
            }
     </script>
</body>

</html>
